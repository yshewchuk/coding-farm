# nginx config for the Cloud Sandbox static host.
# Serves the Vite bundle from /usr/share/nginx/html on 0.0.0.0:8080 with an SPA
# fallback so client-side routes (/signin, /callback, /templates, ...) resolve
# to index.html instead of 404.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: serve index.html for any client-side route not on disk.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite assets are immutable — cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached so new deploys propagate immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # favicon etc. live at the root.
    location = /favicon.svg {
        expires 1h;
    }
}
